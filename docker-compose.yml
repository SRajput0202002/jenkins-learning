# Deploy frontend + backend (used locally and by Jenkins Deploy stage)
services:
  backend:
    image: ${DOCKERHUB_USER:-local}/backend:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  frontend:
    image: ${DOCKERHUB_USER:-local}/frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Browser on host hits backend via published port
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "8082:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
